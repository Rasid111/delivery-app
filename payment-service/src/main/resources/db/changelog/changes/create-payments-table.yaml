databaseChangeLog:
  - changeSet:
      id: create-payments-table-1
      author: rasid
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_payments
                  name: id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_payments_order_id
                  name: order_id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                  name: courier_id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                  name: delivery_price
                  type: NUMERIC(12, 2)
              - column:
                  name: earning
                  type: NUMERIC(12, 2)
              - column:
                  constraints:
                    nullable: false
                  name: status
                  type: VARCHAR(20)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: timestamp
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: timestamp
