databaseChangeLog:
  - changeSet:
      id: create-courier-balances-table-1
      author: rasid
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: courier_balances
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_courier_balances
                  name: courier_id
                  type: UUID
              - column:
                  constraints:
                    nullable: false
                  name: balance
                  type: NUMERIC(12, 2)
              - column:
                  constraints:
                    nullable: false
                  name: turnover
                  type: NUMERIC(12, 2)
              - column:
                  constraints:
                    nullable: false
                  name: updated_at
                  type: timestamp
